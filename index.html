<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>여수광양항만공사 PortSight Slides</title>
    <meta
      name="description"
      content="여수광양항만공사 PortSight 발표 슬라이드 웹 퍼블리싱"
    />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="deck" aria-label="여수광양항만공사 PortSight 발표 슬라이드">
      <nav class="deck-nav" aria-label="슬라이드 이동">
        <a href="#slide-1" aria-label="1번 슬라이드">1</a>
        <a href="#slide-2" aria-label="2번 슬라이드">2</a>
        <a href="#slide-3" aria-label="3번 슬라이드">3</a>
        <a href="#slide-4" aria-label="4번 슬라이드">4</a>
      </nav>

      <section class="slide" id="slide-1" aria-label="1단계 목표">
        <img src="./src/assets/slides/slide-1.png" alt="1단계 목표 슬라이드" />
      </section>

      <section class="slide" id="slide-2" aria-label="단계별 비전">
        <img src="./src/assets/slides/slide-2.png" alt="단계별 비전 슬라이드" />
      </section>

      <section class="slide" id="slide-3" aria-label="기술 적용 전략">
        <img src="./src/assets/slides/slide-3.png" alt="기술 적용 전략 슬라이드" />
      </section>

      <section class="slide" id="slide-4" aria-label="PortSight AI Platform">
        <img src="./src/assets/slides/slide-4.png" alt="PortSight AI Platform 아키텍처 슬라이드" />
      </section>
    </main>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
